root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/bookstore-worker ./cmd/worker/main.go"
  bin = "./tmp/bookstore-worker"
  full_bin = "./tmp/bookstore-worker"
  include_ext = ["go", "yaml"]
  exclude_dir = ["assets", "tmp", "vendor", ".git", "test", "migrations"]
  include_dir = ["cmd/worker", "internal"]
  delay = 1200
  stop_on_error = true

[log]
  time = true