root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/bookstore-api ./cmd/api/main.go"
  bin = "./tmp/bookstore-api"
  full_bin = "./tmp/bookstore-api"
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "toml"]
  exclude_dir = ["assets", "tmp", "vendor", ".git", "test", "migrations", "docs"]
  include_dir = ["cmd/api", "internal"]
  exclude_file = []
  delay = 1000
  stop_on_error = true
  log = "build-errors.log"
  rerun = false

[log]
  time = true
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
